name: Update data

on:
  schedule:
    # Hourly, but off the top-of-hour ":00" slot, which is the most congested on
    # GitHub and where scheduled runs are most often delayed or skipped.
    - cron: "19 * * * *"
  workflow_dispatch: {}    # allow manual runs

# Avoid overlapping runs racing on the committed JSON.
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

# Force JS actions (e.g. setup-uv, still pinned to Node 20) onto Node 24 now.
# GitHub makes this the default on 2026-06-02; setting it explicitly silences the
# deprecation warning in the meantime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Fetch + merge + rebuild site JSON
        run: uv run python -m src.update

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series.json docs/data/history.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
