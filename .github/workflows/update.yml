name: Update data

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch: {}    # allow manual runs

# Avoid overlapping runs racing on the committed JSON.
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fetch + merge + rebuild site JSON
        run: uv run python -m src.update

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series.json docs/data/history.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
